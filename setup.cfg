[flake8]
max-line-length = 88
extend-ignore = E203,W503
per-file-ignores = 
    __init__.py:F401
    */tests/*:S101,B011
    test_*.py:S101,B011
    tests/gatherers/test_html_extractor.py:E501
select = C,E,F,W,B,B9
max-complexity = 15

[tool:pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
markers =
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    slow: marks tests as slow

[isort]
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
line_length = 88