name: Feature Request
description: Propose a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees:
  - juanmanueldaza
body:
  - type: markdown
    attributes:
      value: |
        **Before proposing**: Check [existing discussions](https://github.com/juanmanueldaza/fu7ur3pr00f/discussions) and [open issues](https://github.com/juanmanueldaza/fu7ur3pr00f/issues).

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
      placeholder: "I'm frustrated when..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What should the feature do?
      placeholder: "The feature should..."
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: Usage Examples
      description: Show how users would interact with this
      placeholder: |
        ```
        You:   /new-command --option value
        Agent: [does something useful]
        ```
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?
    validations:
      required: false

  - type: input
    id: scope
    attributes:
      label: Scope
      description: Is this a small change, medium feature, or major addition?
      placeholder: "small / medium / large"
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to implement this feature
          required: false
        - label: I have considered existing alternatives
          required: false
