name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
assignees:
  - juanmanueldaza
body:
  - type: markdown
    attributes:
      value: |
        **Before you start**: Search [existing issues](https://github.com/juanmanueldaza/fu7ur3pr00f/issues) to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: Describe the bug clearly with actual vs expected behavior
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: How can we reproduce this?
      placeholder: |
        1. Run `fu7ur3pr00f`
        2. Execute command `/gather`
        3. See error...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Run `fu7ur3pr00f --version` or check pip
      placeholder: "0.1.8"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python Version
      description: Run `python --version`
      placeholder: "3.13.1"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: OS and version
      placeholder: "Ubuntu 24.04, macOS 15.0, Windows 11"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Run with `fu7ur3pr00f --debug` and paste relevant output
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues
          required: true
        - label: I have included debug output
          required: false
